name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "functions/**"
      - ".github/workflows/**"

jobs:
  deploy-lead-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Deploy lead API Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: functions
          command: deploy

  deploy-danova:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install analytics dependencies
        working-directory: web/modules/analytics
        run: npm ci

      - name: Install dependencies
        working-directory: web/apps/danova
        run: npm ci

      - name: Build danova
        working-directory: web/apps/danova
        env:
          NEXT_PUBLIC_LEAD_API_URL: ${{ secrets.LEAD_API_URL || 'https://danova-lead-api.workers.dev' }}
        run: npm run build

      - name: Deploy danova to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web/apps/danova
          command: pages deploy out --project-name danova

  deploy-landing:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install analytics dependencies
        working-directory: web/modules/analytics
        run: npm ci

      - name: Install dependencies
        working-directory: web/apps/danova-lead
        run: npm ci

      - name: Build danova-lead
        working-directory: web/apps/danova-lead
        env:
          # Set LEAD_API_URL secret to your Worker URL; default for build only
          NEXT_PUBLIC_LEAD_API_URL: ${{ secrets.LEAD_API_URL || 'https://danova-lead-api.workers.dev' }}
        run: npm run build

      - name: Deploy danova-lead to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web/apps/danova-lead
          command: pages deploy out --project-name danova-lead
