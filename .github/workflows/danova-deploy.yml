name: Deploy Danova

on:
  push:
    branches:
      - main
      - test
    paths:
      - "web/apps/danova/**"
      - "web/modules/**"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/tag/SHA to deploy (default: current branch)"
        required: false
        default: ""
      target_branch:
        description: "Cloudflare Pages branch target"
        required: false
        type: choice
        options:
          - main
          - test
        default: test

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      SOURCE_REF: ${{ github.event.inputs.ref || github.ref }}
      TARGET_BRANCH: ${{ github.event.inputs.target_branch || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Skip cache to avoid @tailwindcss/oxide native binding issues (npm#4828)

      - name: Install analytics dependencies
        working-directory: web/modules/analytics
        run: npm ci

      - name: Install dependencies
        working-directory: web/apps/danova
        run: npm ci

      - name: Build
        working-directory: web/apps/danova
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_DEPLOY_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web/apps/danova
          command: pages deploy out --project-name=${{ vars.CF_PAGES_PROJECT_DANOVA }} --branch=${{ env.TARGET_BRANCH }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
